server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm application/manifest+json;

    # PWA: the service worker and its registration must revalidate so that a new
    # build actually reaches returning visitors (never hard-cache these).
    location = /sw.js                 { add_header Cache-Control "no-cache"; }
    location = /registerSW.js         { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest  { add_header Cache-Control "no-cache"; }

    # Content-hashed build output — safe to cache forever.
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    # Client-side ML models (large, rarely change).
    location /models/ { expires 30d; add_header Cache-Control "public"; }
    location ~* \.(woff2|svg|png|jpe?g|gif|ico|webp|wasm|onnx)$ { expires 30d; add_header Cache-Control "public"; }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
