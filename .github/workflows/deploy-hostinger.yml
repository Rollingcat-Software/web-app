name: Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package*.json'
      - 'vite.config.*'
      - 'index.html'
      - '.github/workflows/deploy-hostinger.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Write production env
        # NOTE (Sec-P0b 2026-04-29): VITE_BIOMETRIC_API_URL/KEY removed.
        # All biometric calls now route through identity-core-api at
        # api.fivucsas.com; the X-API-Key is held server-side only.
        run: |
          cat > .env.production << 'EOF'
          VITE_API_BASE_URL=https://api.fivucsas.com/api/v1
          VITE_API_TIMEOUT=30000
          VITE_APP_NAME=FIVUCSAS Admin
          VITE_APP_VERSION=1.0.0
          VITE_ENVIRONMENT=production
          VITE_TOKEN_STORAGE=sessionStorage
          VITE_SESSION_TIMEOUT=3600000
          VITE_ENABLE_ANALYTICS=false
          VITE_ENABLE_ERROR_REPORTING=false
          VITE_ENABLE_DARK_MODE=true
          VITE_ENABLE_MOCK_API=false
          EOF

      - run: npm run build

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude auth-test
          path: dist/
          remote_path: ~/domains/app.fivucsas.com/public_html/
          remote_host: ${{ secrets.HOSTINGER_IP }}
          remote_port: ${{ secrets.HOSTINGER_PORT }}
          remote_user: ${{ secrets.HOSTINGER_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}
